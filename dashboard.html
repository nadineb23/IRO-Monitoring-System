<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRO Monitoring System - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.3.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.14/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="logbook.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body class="h-screen w-screen">
    <div id="root" class="h-full w-full"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        // =====================================================================
        // COMMON COMPONENTS
        // These components are generic and can be used across different sections.
        // =====================================================================

        // ExportButtons Component: Handles exporting table data to various formats
        function ExportButtons({ data, headers, filename, darkMode }) {
            // Function to export data to CSV format
            const exportToCSV = () => {
                // Convert data to CSV string
                const csvContent = [
                    headers.join(','), // Join headers with comma
                    ...data.map(row => Object.values(row).join(',')) // Join row values with comma
                ].join('\n'); // Join all rows with newline

                // Create a Blob object from the CSV content
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                // Create a URL for the Blob
                const link = document.createElement('a');
                if (link.download !== undefined) { // Check if the download attribute is supported
                    const url = URL.createObjectURL(blob); // Create object URL
                    link.setAttribute('href', url); // Set href to the URL
                    link.setAttribute('download', `${filename}.csv`); // Set download filename
                    link.style.visibility = 'hidden'; // Hide the link
                    document.body.appendChild(link); // Append to body
                    link.click(); // Programmatically click the link to trigger download
                    document.body.removeChild(link); // Remove the link
                }
            };

            // Function to export data to Excel (XLSX) format
            const exportToExcel = () => {
                // Create a new workbook
                const wb = XLSX.utils.book_new();
                // Convert JSON data to worksheet
                const ws = XLSX.utils.json_to_sheet(data);
                // Add worksheet to workbook
                XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
                // Write workbook to file
                XLSX.writeFile(wb, `${filename}.xlsx`);
            };

            // Function to export data to PDF format
            const exportToPDF = () => {
                // Initialize jsPDF document
                const doc = new window.jspdf.jsPDF();
                // AutoTable plugin for jsPDF to generate tables
                doc.autoTable({
                    head: [headers], // Table headers
                    body: data.map(row => Object.values(row)), // Table body data
                    startY: 20, // Start Y position for the table
                    theme: 'grid', // Table theme
                    styles: {
                        fontSize: 8, // Font size for table content
                        cellPadding: 2, // Padding within cells
                        fillColor: darkMode ? [55, 65, 81] : [243, 244, 246], // Cell background color
                        textColor: darkMode ? [255, 255, 255] : [0, 0, 0], // Cell text color
                        lineColor: darkMode ? [75, 85, 99] : [229, 231, 235], // Cell border color
                    },
                    headStyles: {
                        fillColor: darkMode ? [31, 41, 55] : [209, 213, 219], // Header background color
                        textColor: darkMode ? [255, 255, 255] : [0, 0, 0], // Header text color
                        fontStyle: 'bold', // Header font style
                    },
                    alternateRowStyles: {
                        fillColor: darkMode ? [63, 72, 87] : [249, 250, 251], // Alternate row background color
                    },
                });
                // Save the PDF document
                doc.save(`${filename}.pdf`);
            };

            return (
                <div className="flex space-x-2">
                    <button
                        onClick={exportToCSV}
                        className={`px-3 py-1 rounded-md font-semibold text-xs
                            ${darkMode ? 'bg-orange-600 hover:bg-orange-500 text-white' : 'bg-orange-200 hover:bg-orange-300 text-gray-800'}
                        `}
                        title="Export to CSV"
                    >
                        CSV
                    </button>
                    <button
                        onClick={exportToExcel}
                        className={`px-3 py-1 rounded-md font-semibold text-xs
                            ${darkMode ? 'bg-green-600 hover:bg-green-500 text-white' : 'bg-green-500 hover:bg-green-600 text-white'}
                        `}
                        title="Export to Excel"
                    >
                        Excel
                    </button>
                    <button
                        onClick={exportToPDF}
                        className={`px-3 py-1 rounded-md font-semibold text-xs
                            ${darkMode ? 'bg-red-600 hover:bg-red-500 text-white' : 'bg-red-500 hover:bg-red-600 text-white'}
                        `}
                        title="Export to PDF"
                    >
                        PDF
                    </button>
                </div>
            );
        }

        // SearchBar Component
        function SearchBar({ darkMode }) {
            return (
                <div className="flex-grow flex items-center">
                    <input
                        type="text"
                        placeholder="Search documents..."
                        className={`
                            w-full max-w-lg p-3 pl-4 rounded-full shadow-md
                            ${darkMode
                                ? 'bg-gray-800 text-gray-200 border border-gray-600 focus:border-blue-500 focus:ring-blue-500'
                                : 'bg-white text-gray-700 border border-gray-300 focus:border-blue-500 focus:ring-blue-500'
                            }
                            focus:outline-none focus:ring-1
                        `}
                    />
                    <i className="fas fa-search -ml-8 text-gray-400"></i>
                </div>
            );
        }

        // Generic Content Loader Component (for display.html and other static content if needed)
        function StaticContentLoader({ fileName, title, darkMode }) {
            const [content, setContent] = React.useState("Loading content...");

            React.useEffect(() => {
                fetch(fileName)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        return response.text();
                    })
                    .then(htmlContent => {
                        setContent(htmlContent);
                    })
                    .catch(error => {
                        console.error(`Error fetching ${fileName}:`, error);
                        setContent(`Failed to load ${title}. Error: ${error.message}`);
                    });
            }, [fileName, title]);

            return (
                <div className="p-6">
                    <h2 className={`text-3xl font-bold mb-4 ${darkMode ? 'text-white' : 'text-gray-800'}`}>{title}</h2>
                    <div
                        className={`p-6 rounded-lg shadow-md overflow-auto h-full ${darkMode ? 'bg-gray-700 text-gray-200' : 'bg-white text-gray-700'}`}
                        style={{ maxHeight: 'calc(100vh - 200px)' }}
                        dangerouslySetInnerHTML={{ __html: content }}
                    >
                    </div>
                </div>
            );
        }

        // ManageProfileModal Component (remains for "Manage Profile" action)
        function ManageProfileModal({ show, onClose, darkMode }) {
            const [activeTab, setActiveTab] = React.useState('updateProfile');

            if (!show) {
                return null;
            }

            return (
                <div className="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50">
                    <div className={`rounded-lg shadow-xl w-11/12 md:w-2/3 lg:w-1/2 p-6 relative ${darkMode ? 'bg-gray-800 text-gray-200' : 'bg-white text-gray-800'}`}>
                        <button
                            onClick={onClose}
                            className={`absolute top-3 right-3 text-2xl font-bold ${darkMode ? 'text-gray-400 hover:text-white' : 'text-gray-700 hover:text-gray-900'}`}
                        >
                            &times;
                        </button>
                        <h3 className={`text-2xl font-bold mb-6 ${darkMode ? 'text-white' : 'text-gray-800'}`}>Manage Profile</h3>

                        <div className="flex border-b border-gray-200 dark:border-gray-600 mb-4">
                            <button
                                className={`flex-1 py-2 px-4 text-center font-medium ${activeTab === 'updateProfile' ? (darkMode ? 'text-blue-400 border-b-2 border-blue-400' : 'text-blue-600 border-b-2 border-blue-600') : (darkMode ? 'text-gray-400 hover:text-blue-300' : 'text-gray-500 hover:text-blue-500')}`}
                                onClick={() => setActiveTab('updateProfile')}
                            >
                                Update Profile
                            </button>
                            <button
                                className={`flex-1 py-2 px-4 text-center font-medium ${activeTab === 'updatePassword' ? (darkMode ? 'text-blue-400 border-b-2 border-blue-400' : 'text-blue-600 border-b-2 border-blue-600') : (darkMode ? 'text-gray-400 hover:text-blue-300' : 'text-gray-500 hover:text-blue-500')}`}
                                onClick={() => setActiveTab('updatePassword')}
                            >
                                Update Password
                            </button>
                        </div>

                        {activeTab === 'updateProfile' && (
                            <div>
                                <div className="mb-4">
                                    <label htmlFor="name" className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Name</label>
                                    <input
                                        type="text"
                                        id="name"
                                        className={`w-full p-2 border rounded-md ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-200' : 'border-gray-300'}`}
                                        defaultValue="Juan Dela Cruz"
                                    />
                                </div>
                                <div className="mb-4">
                                    <label htmlFor="designation" className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Designation</label>
                                    <input
                                        type="text"
                                        id="designation"
                                        className={`w-full p-2 border rounded-md ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-200' : 'border-gray-300'}`}
                                        defaultValue="Administrator"
                                        readOnly
                                    />
                                </div>
                                <button className={`px-4 py-2 rounded-md font-semibold ${darkMode ? 'bg-blue-600 hover:bg-blue-700 text-white' : 'bg-blue-500 hover:bg-blue-600 text-white'}`}>Save Profile</button>
                            </div>
                        )}

                        {activeTab === 'updatePassword' && (
                            <div>
                                <div className="mb-4">
                                    <label htmlFor="current-password" className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Current Password</label>
                                    <input
                                        type="password"
                                        id="current-password"
                                        className={`w-full p-2 border rounded-md ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-200' : 'border-gray-300'}`}
                                    />
                                </div>
                                <div className="mb-4">
                                    <label htmlFor="new-password" className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>New Password</label>
                                    <input
                                        type="password"
                                        id="new-password"
                                        className={`w-full p-2 border rounded-md ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-200' : 'border-gray-300'}`}
                                    />
                                </div>
                                <div className="mb-4">
                                    <label htmlFor="confirm-password" className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>Confirm New Password</label>
                                    <input
                                        type="password"
                                        id="confirm-password"
                                        className={`w-full p-2 border rounded-md ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-200' : 'border-gray-300'}`}
                                    />
                                </div>
                                <button className={`px-4 py-2 rounded-md font-semibold ${darkMode ? 'bg-blue-600 hover:bg-blue-700 text-white' : 'bg-blue-500 hover:bg-blue-600 text-white'}`}>Change Password</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // MODIFIED: AddLogbookEntryModal Component
        function AddLogbookEntryModal({ show, onClose, darkMode, selectedCategory }) {
            const [showReleaseFields, setShowReleaseFields] = React.useState(false);
            const [selectedOptions, setSelectedOptions] = React.useState([]);
            const toggleOption = (option) => {
            setSelectedOptions((prevOptions) =>
            prevOptions.includes(option)
            ? prevOptions.filter((item) => item !== option) // Remove if already selected
            : [...prevOptions, option] // Add if not selected
            );
        };
            if (!show) {
                return null;
            }

            // Helper function to render form fields to reduce repetition
            const renderInputField = (id, label, type = "text", placeholder = "", required = true) => (
                <div className="mb-4">
                    <label htmlFor={id} className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>{label}</label>
                    <input
                        type={type}
                        id={id}
                        className={`w-full p-2 border rounded-md ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-200' : 'border-gray-300'}`}
                        placeholder={placeholder || `Enter ${label}`}
                        required={required}
                    />
                </div>
            );

            const renderTextareaField = (id, label, placeholder = "") => (
                <div className="mb-4">
                    <label htmlFor={id} className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>{label}</label>
                    <textarea
                        id={id}
                        rows="3"
                        className={`w-full p-2 border rounded-md ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-200' : 'border-gray-300'}`}
                        placeholder={placeholder || `Enter ${label}`}
                    ></textarea>
                </div>
            );
            const renderFileareaField = (id, label) => (
                <div className="mb-4">
                    <label htmlFor={id} className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                    {label}
                    </label>
                    <input
                        type="file" // Changed to file input
                        id={id}
                        name={id} // Added name attribute
                        className={`w-full p-2 border rounded-md ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-200' : 'border-gray-300'}`}
                        />
                    </div>
                 );
            const renderMemoAreaScanField = (id, label) => (
                <div className="mb-4">
                    <label htmlFor={id} className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                    {label}
                    </label>
                    <input
                        type="file" // Changed to file input
                        id={id}
                        name={id} // Added name attribute
                        className={`w-full p-2 border rounded-md ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-200' : 'border-gray-300'}`}
                        />
                    </div>
                 );
              const renderTickboxField = (id, label, checked, onChange) => (
                    <div className="mb-4 flex items-center">
                            <input
                                type="checkbox"
                                id="incoming-tickbox" 
                                // The checkbox is checked if showReleaseFields is true
                                checked={showReleaseFields} 
                                // When clicked, update the state
                                onChange={(e) => setShowReleaseFields(e.target.checked)} 
                                className="mr-2 h-4 w-4 text-blue-600 rounded focus:ring-blue-500"
                            />
                            <label htmlFor="incoming-tickbox" className={`text-sm font-medium ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                                For Release
                            </label>
                        </div>
                         );
            const renderSoftTickboxField = (id, label, onChange) => (
                    <div className="mb-4 flex items-center">
                            <input
                                type="checkbox"
                                id="tota-soft" 
                                checked={selectedOptions.includes('soft')}
                                onChange={() => toggleOption('soft')}
                                className="mr-2 h-4 w-4 text-blue-600 rounded focus:ring-blue-500"
                            />
                            <label htmlFor="tota-soft" className={`text-sm font-medium ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                               Softcopy
                            </label>
                        </div>
                         );
            const renderHardTickboxField = (id, label, onChange) => (
                    <div className="mb-4 flex items-center">
                            <input
                                type="checkbox"
                                id="tota-hard" 
                                checked={selectedOptions.includes('hard')}
                                onChange={() => toggleOption('hard')}
                                className="mr-2 h-4 w-4 text-blue-600 rounded focus:ring-blue-500"
                            />
                            <label htmlFor="tota-hard" className={`text-sm font-medium ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                               Hardcopy
                            </label>
                        </div>
                         );
            const renderSelectField = (id, label, options) => (
                <div className="mb-4">
                    <label htmlFor={id} className={`block text-sm font-medium mb-1 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>{label}</label>
                    <select id={id} className={`w-full p-2 border rounded-md ${darkMode ? 'bg-gray-700 border-gray-600 text-gray-200' : 'border-gray-300'}`} required>
                        {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                    </select>
                </div>
            );
            // Function to render the correct form based on the category
            const renderFormForCategory = () => {
                switch (selectedCategory) {
                    case "Incoming Documents":
                        return (
                            <>  
                                {renderInputField("incoming-ent-code", "Entry Code")}
                                {renderInputField("incoming-ref-code", "Reference Code")}
                                {renderInputField("incoming-datetime", "Date and Time Received", "datetime-local")}
                                {renderInputField("incoming-origin", "Office/Agency/Unit")}
                                {renderInputField("incoming-subject", "Document Subject")}
                                {renderFileareaField("incoming-scan", "Scanned Copy")}
                                {renderTickboxField("incoming-tickbox", "For Release")}
                                {/* Conditional Release Fields */}
                                {showReleaseFields && (
                                    <>
                                        {renderInputField("release-datetime", "Release Date and Time", "datetime-local")}
                                        {renderInputField("receiver-office", "Receiver Office/Agency/Unit")}
                                    </>
                                )}

                                {/* Remarks field, now conditionally placed */}
                                {renderTextareaField("incoming-remarks", "Remarks")}
                            </>                         
                        );
                    case "Outgoing Documents":
                        return (
                            <>  
                                {renderInputField("incoming-ent-code", "Entry Code")}
                                {renderInputField("incoming-ref-code", "Reference Code")}
                                {renderInputField("outgoing-type", "Document Type")}
                                {renderInputField("outgoing-datetime", "Date and Time Released", "datetime-local")}
                                {renderInputField("outgoing-destination", "Office/Agency/Unit")}
                                {renderFileareaField("incoming-scan", "Scanned Copy")}
                                {renderTextareaField("outgoing-remarks", "Remarks")}
                            </>
                        );
                    case "Foreign Travels - Personnels":
                        return (
                            <>  
                                {renderInputField("ft-travel-date", "Date of Travel")}
                                {renderInputField("ft-personnel-name", "Name of Personnel")}
                                {renderInputField("ft-personnel-destination", "Destination (Country/City)")}
                                {renderInputField("ft-personnel-purpose", "Purpose of Travel")}
                                <div className="grid grid-cols-2 gap-4 mb-4">
                                    {renderInputField("ft-personnel-start-date", "Start Date", "date")}
                                    {renderInputField("ft-personnel-end-date", "End Date", "date")}
                                </div>
                                {renderInputField("ft-date-released", "Date Released")}
                                {renderInputField("ft-released-to", "Released to")}
                                {renderTextareaField("ft-personnel-remarks", "Remarks")}
                            </>
                        );
                    case "Foreign Travels - Students":
                        return (
                            <>
                                {renderInputField("ft-travel-date", "Date of Travel")}
                                {renderInputField("ft-student-name", "Name of Student")}
                                {renderInputField("ft-personnel-destination", "Destination (Country/City)")}
                                {renderInputField("ft-student-purpose", "Purpose of Travel")}
                                <div className="grid grid-cols-2 gap-4 mb-4">
                                    {renderInputField("ft-student-start-date", "Travel Start Date", "date")}
                                    {renderInputField("ft-student-end-date", "Travel End Date", "date")}
                                </div>
                                {renderInputField("ft-date-released", "Date Released")}
                                {renderInputField("ft-released-to", "Released to")}
                                {renderTextareaField("ft-personnel-remarks", "Remarks")}
                            </>
                        );
                    case "TOTA":
                        return (
                            <>
                                {renderInputField("to-date-recieved", "Date Received", "date")}
                                {renderInputField("ft-reciever", "Name of Reciever")}
                                {renderInputField("ft-tota-destination", "Destination (Country/City)")}
                                {renderInputField("ft-released-to", "Released to")}
                                {renderInputField("ft-date-released", "Date Released")}
                                <p style={{ fontWeight: 'bold', marginBottom: '16px' }}>Travel Report</p>
                                {renderSoftTickboxField("tota-soft", "Softcopy")}
                                {renderInputField("to-date", "Date", "date")}
                                {renderHardTickboxField("tota-hard", "Hardcopy")}
                                {renderInputField("to-date", "Date", "date")}
                                {renderTextareaField("to-remarks", "Remarks")}
                            </>
                        );
                    case "IRO Memos":
                        return (
                            <>
                                {renderInputField("memo-no", "IRO Memo No.")}
                                {renderInputField("memo-for", "For")}
                                {renderInputField("memo-subject", "Subject")}
                                {renderInputField("memo-date", "Date")}
                                {renderMemoAreaScanField("memo-scan", "Scanned Copy")}
                                {renderTextareaField("memo-remarks", "Remarks")}
                            </>
                        );
                    default:
                        // Fallback for a generic case or if no category is selected
                        return (
                            <p className="text-center">Please select a category first to see the relevant fields.</p>
                        );
                }
            };

            return (
                <div className="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50">
                    <div className={`rounded-lg shadow-xl w-11/12 md:w-1/2 lg:w-1/3 p-6 relative ${darkMode ? 'bg-gray-800 text-gray-200' : 'bg-white text-gray-800'}`}>
                        <button
                            onClick={onClose}
                            className={`absolute top-3 right-3 text-2xl font-bold ${darkMode ? 'text-gray-400 hover:text-white' : 'text-gray-700 hover:text-gray-900'}`}
                        >
                            &times;
                        </button>
                        <h3 className={`text-2xl font-bold mb-6 ${darkMode ? 'text-white' : 'text-gray-800'}`}>Add New Logbook Entry</h3>
                        {selectedCategory && (
                             <p className={`mb-4 text-sm ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>
                                Category: <span className="font-semibold">{selectedCategory}</span>
                            </p>
                        )}

                        <form>
                            <div className="max-h-[60vh] overflow-y-auto pr-4">
                                {renderFormForCategory()}
                            </div>
                            <div className={`flex justify-end mt-6 pt-4 border-t ${darkMode ? 'border-gray-600' : 'border-gray-200'}`}>
                                <button
                                    type="button"
                                    onClick={onClose}
                                    className={`mr-2 px-4 py-2 rounded-md font-semibold ${darkMode ? 'bg-gray-600 hover:bg-gray-700 text-white' : 'bg-gray-300 hover:bg-gray-400 text-gray-800'}`}
                                >
                                    Cancel
                                </button>
                                <button
                                    type="submit"
                                    className={`px-4 py-2 rounded-md font-semibold ${darkMode ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-green-500 hover:bg-green-600 text-white'}`}
                                >
                                    Add Entry
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // StudentTravelOrderModal Component - MODIFIED
        function StudentTravelOrderModal({ show, onClose, darkMode }) {
            const [name, setName] = React.useState('');
            const [college, setCollege] = React.useState('');
            const [program, setProgram] = React.useState('');
            const [isCostCovered, setIsCostCovered] = React.useState(null); // null, 'cost', or 'noCost'

            if (!show) {
                return null;
            }

            const fileInputClasses = `w-full p-2 border rounded-md file:mr-4 file:py-2 file:px-4
                                    file:rounded-full file:border-0 file:text-sm file:font-semibold

                        <button className={`flex-1 py-2 px-4 text-center font-medium rounded-t-lg ${activeTab === 'inbound' ? (darkMode ? 'text-blue-400 border-b-2 border-blue-400 bg-gray-700' : 'text-blue-600 border-b-2 border-blue-600 bg-white') : (darkMode ? 'text-gray-400 hover:text-blue-300' : 'text-gray-500 hover:text-blue-500')}`} onClick={() => setActiveTab('inbound')}> Inbound Personnel </button>
                        <button className={`flex-1 py-2 px-4 text-center font-medium rounded-t-lg ${activeTab === 'outbound' ? (darkMode ? 'text-blue-400 border-b-2 border-blue-400 bg-gray-700' : 'text-blue-600 border-b-2 border-blue-600 bg-white') : (darkMode ? 'text-gray-400 hover:text-blue-300' : 'text-gray-500 hover:text-blue-500')}`} onClick={() => setActiveTab('outbound')}> Outbound Personnel </button>
                    </div>
                    <div className={`mt-4 p-6 rounded-lg shadow-md overflow-x-auto max-w-full mx-auto ${darkMode ? 'bg-gray-700 text-gray-200' : 'bg-white text-gray-700'}`}>
                        <div className="flex justify-between items-center mb-4">
                            {activeTab === 'inbound' ? (
                                <ExportButtons data={exportableInboundPersonnel} headers={exportHeadersInbound} filename="PersonnelMobility_Inbound" darkMode={darkMode} />
                            ) : (
                                <ExportButtons data={exportableOutboundPersonnel} headers={exportHeadersOutbound} filename="PersonnelMobility_Outbound" darkMode={darkMode} />
                            )}
                            </div>
                        <table className="min-w-full divide-y divide-gray-200 dark:divide-gray-600">
                            <thead className={`${darkMode ? 'bg-gray-600' : 'bg-gray-50'}`}><tr>{tableHeaders.map(header => (<th key={header} scope="col" className="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">{header}</th>))}</tr></thead>
                            <tbody className="divide-y divide-gray-200 dark:divide-gray-600">
                                {currentPersonnel.length > 0 ? (currentPersonnel.map(personnel => (<tr key={personnel.id}><td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-center">{personnel.id}</td><td className="px-6 py-4 whitespace-nowrap text-sm text-center">{personnel.name}</td>{activeTab === 'inbound' ? (<><td className="px-6 py-4 whitespace-nowrap text-sm text-center">{personnel.homeInstitution}</td><td className="px-6 py-4 whitespace-nowrap text-sm text-center">{personnel.hostDepartment}</td></>) : (<><td className="px-6 py-4 whitespace-nowrap text-sm text-center">{personnel.department}</td><td className="px-6 py-4 whitespace-nowrap text-sm text-center">{personnel.hostInstitution}</td><td className="px-6 py-4 whitespace-nowrap text-sm text-center">{personnel.destinationCountry}</td></>)}<td className="px-6 py-4 whitespace-nowrap text-sm text-center">{personnel.purpose}</td><td className="px-6 py-4 whitespace-nowrap text-sm text-center">{personnel.startDate}</td><td className="px-6 py-4 whitespace-nowrap text-sm text-center">{personnel.endDate}</td><td className="px-6 py-4 whitespace-nowrap text-sm text-center">{personnel.status}</td><td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-center"><div className="flex space-x-2 justify-center"><button onClick={() => handleEdit(personnel.id, activeTab)} className={`p-2 rounded-full ${darkMode ? 'bg-blue-600 hover:bg-blue-700 text-white' : 'bg-blue-500 hover:bg-blue-600 text-white'}`} title="Edit"><i className="fas fa-edit"></i></button><button onClick={() => handleDelete(personnel.id, activeTab)} className={`p-2 rounded-full ${darkMode ? 'bg-red-600 hover:bg-red-700 text-white' : 'bg-red-500 hover:bg-red-600 text-white'}`} title="Delete"><i className="fas fa-trash"></i></button></div></td></tr>))) : (<tr><td colSpan={tableHeaders.length} className="px-6 py-4 text-center text-sm text-gray-500">No {activeTab} personnel mobility records found.</td></tr>)}
                            </tbody>
                        </table>
                    </div>
                    <AddInboundPersonnelModal show={showAddInboundModal} onClose={() => setShowAddInboundModal(false)} darkMode={darkMode} onAddRecord={handleAddInboundRecord} />
                    <AddOutboundPersonnelModal show={showAddOutboundModal} onClose={() => setShowAddOutboundModal(false)} darkMode={darkMode} onAddRecord={handleAddOutboundRecord} />
                </div>
            );
        }
        function MobilityView({ darkMode, onSelectStudentMobility, onSelectPersonnelMobility }) {
            return (
                <div className={`p-8 text-center rounded-lg shadow-xl ${darkMode ? 'bg-gray-800 text-gray-200' : 'bg-white text-gray-800'}`}>
                    <h2 className="text-3xl font-bold mb-4">University Mobility</h2>
                    <p className="text-gray-700 mb-8">Select a category to view and manage mobility records.</p>

                    <div id="mobility-category-buttons" className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6" >
                        <div className={`p-6 rounded-lg shadow-md cursor-pointer flex flex-col justify-between items-center text-center transition-all duration-300 ease-in-out ${darkMode ? 'bg-gray-700 text-gray-200 hover:bg-gray-600' : 'bg-blue-50 text-blue-800 hover:bg-blue-100'}`} onClick={onSelectStudentMobility} >
                            <div className="flex items-center justify-center w-16 h-16 rounded-full bg-blue-500 text-white mb-4"><i className="fas fa-user-graduate text-3xl"></i></div>
                            <h3 className="text-xl font-semibold mb-2">Student Mobility</h3>
                            <p className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>Manage incoming and outgoing student records.</p>
                        </div>
                        <div className={`p-6 rounded-lg shadow-md cursor-pointer flex flex-col justify-between items-center text-center transition-all duration-300 ease-in-out ${darkMode ? 'bg-gray-700 text-gray-200 hover:bg-gray-600' : 'bg-green-50 text-green-800 hover:bg-green-100'}`} onClick={onSelectPersonnelMobility} >
                            <div className="flex items-center justify-center w-16 h-16 rounded-full bg-green-500 text-white mb-4"><i className="fas fa-users text-3xl"></i></div>
                            <h3 className="text-xl font-semibold mb-2">Personnel Mobility</h3>
                            <p className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-600'}`}>Manage incoming and outgoing faculty/staff records.</p>
                        </div>
                    </div>
                </div>
            );
        }

    // =====================================================================
    // DASHBOARD PAGE COMPONENT (Primary component)
    // =====================================================================

    function DashboardPage({ onSignOut, darkMode, username, toggleDarkMode }) {
        const [isProfileDropdownOpen, setIsProfileDropdownOpen] = React.useState(false);
        const [isSidebarCollapsed, setIsSidebarCollapsed] = React.useState(false);
        const [activeMenuItem, setActiveMenuItem] = React.useState('dashboard');
        const [showManageProfileModal, setShowManageProfileModal] = React.useState(false);
        const dropdownRef = React.useRef(null);

        const toggleProfileDropdown = () => setIsProfileDropdownOpen(prev => !prev);
        const toggleSidebar = () => setIsSidebarCollapsed(prev => !prev);
        const handleMenuItemClick = (menuItem) => setActiveMenuItem(menuItem);
        const handleManageProfileClick = (e) => {
            e.preventDefault();
            setIsProfileDropdownOpen(false);
            setShowManageProfileModal(true);
        };
        const handleCloseManageProfileModal = () => setShowManageProfileModal(false);
        
        const handleSelectStudentMobility = () => setActiveMenuItem('mobility-students');
        const handleSelectPersonnelMobility = () => setActiveMenuItem('mobility-personnel');

        // NEW: Function to navigate to a specific section, passed down to children
        const handleNavigateToSection = (section) => {
            setActiveMenuItem(section);
        };


        React.useEffect(() => {
            function handleClickOutside(event) {
                if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                    setIsProfileDropdownOpen(false);
                }
            }
            document.addEventListener("mousedown", handleClickOutside);
            return () => document.removeEventListener("mousedown", handleClickOutside);
        }, []);

        return (
            <div className={`flex flex-col h-full w-full ${darkMode ? 'dark-mode-dashboard' : 'light-mode-dashboard'}`}>
                <div className="flex flex-1 overflow-hidden">
                    <aside className={`p-2 shadow-lg bg-[#140ca2] text-white transition-all duration-300 ease-in-out ${isSidebarCollapsed ? 'w-16' : 'w-64'}`}>
                        <div className="flex items-center justify-between mb-8">
                            {!isSidebarCollapsed && (<img src="iro.jpg" alt="IRO Logo" className="h-8 w-8 rounded-full mr-1" />)}
                            {!isSidebarCollapsed && <h1 className="text-l font-bold whitespace-nowrap">IRO Monitoring System</h1>}
                            <button onClick={toggleSidebar} className="p-2 rounded-full hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500"><i className={`fas ${isSidebarCollapsed ? 'fa-bars' : 'fa-times'} text-lg`}></i>&nbsp;</button>
                        </div>
                        <nav className="space-y-4">
                            <a href="#" onClick={() => handleMenuItemClick('dashboard')} className={`block p-2 rounded-md font-semibold ${darkMode ? 'hover:bg-blue-700' : 'hover:bg-blue-600'} flex items-center ${activeMenuItem === 'dashboard' ? 'bg-blue-700' : ''}`}><i className="fas fa-th-large mr-2"></i>{!isSidebarCollapsed && <span className="whitespace-nowrap">Dashboard</span>}</a>
                            <a href="logbook.html" className={`block p-2 rounded-md font-semibold ${darkMode ? 'hover:bg-blue-700' : 'hover:bg-blue-600'} flex items-center`}><i className="fas fa-book mr-2"></i>{!isSidebarCollapsed && <span className="whitespace-nowrap">Logbooks</span>}</a>
                            <a href="#" onClick={() => handleMenuItemClick('mobility')} className={`block p-2 rounded-md font-semibold ${darkMode ? 'hover:bg-blue-700' : 'hover:bg-blue-600'} flex items-center ${activeMenuItem.startsWith('mobility') ? 'bg-blue-700' : ''}`}><i className="fas fa-globe mr-2"></i>{!isSidebarCollapsed && <span className="whitespace-nowrap">Mobility</span>}</a>
                            <a href="#" onClick={() => handleMenuItemClick('travelOrderAuthority')} className={`block p-2 rounded-md font-semibold ${darkMode ? 'hover:bg-blue-700' : 'hover:bg-blue-600'} flex items-center ${activeMenuItem === 'travelOrderAuthority' ? 'bg-blue-700' : ''}`}><i className="fas fa-clipboard-list mr-2"></i>{!isSidebarCollapsed && <span className="whitespace-nowrap">Travel Requests</span>}</a>
                        </nav>
                    </aside>

                    <main className={`flex-1 p-6 overflow-y-auto main-dashboard-content relative ${darkMode ? 'dark-mode-main-content' : ''} ${isSidebarCollapsed ? 'sidebar-collapsed' : 'sidebar-expanded'}`}>
                        <div className="flex justify-between items-center mb-8">
                            <SearchBar darkMode={darkMode} />
                            <div className="flex items-center z-50 mr-4">
                                <button onClick={toggleDarkMode} title={darkMode ? "Switch to Light Mode" : "Switch to Dark Mode"} className={`inline-flex justify-center items-center h-10 w-10 rounded-full shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 ${darkMode ? 'bg-gray-700 hover:bg-gray-600 text-gray-200' : 'bg-gray-200 hover:bg-gray-300 text-gray-600'} mr-4`}><i className={darkMode ? "fas fa-sun text-2xl" : "fas fa-moon text-2xl"}></i></button>
                                <div id="profile-dropdown-container" className="relative inline-block text-left" ref={dropdownRef}>
                                    <button type="button" onClick={toggleProfileDropdown} className="inline-flex justify-center items-center h-10 w-10 bg-blue-700 rounded-full text-white hover:bg-blue-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500" id="user-menu-button" aria-expanded={isProfileDropdownOpen} aria-haspopup="true"><i className="fas fa-user text-2xl"></i></button>
                                    {isProfileDropdownOpen && (
                                        <div className="profile-dropdown-menu origin-top-right absolute right-0 mt-2 w-56 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none" designation="menu" aria-orientation="vertical" aria-labelledby="user-menu-button" tabIndex="-1">
                                            <div className="px-4 py-2 border-b border-gray-200 text-gray-700"><p className="font-bold">{username}</p><p className="text-xs text-gray-500">Administrator</p></div>
                                                <a href="profile-page.html" className="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900" designation="menuitem" tabIndex="-1"><i className="fas fa-user-circle mr-2"></i> My Profile</a>
                                                <a href="#" onClick={handleManageProfileClick} className="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 hover:text-gray-900" designation="menuitem" tabIndex="-1"><i className="fas fa-cog mr-2"></i> Manage Profile</a>
                                                <div className="border-t border-gray-200"></div>
                                                <button onClick={onSignOut} className="block w-full text-left px-4 py-2 text-sm text-red-700 hover:bg-red-50 hover:text-red-900" designation="menuitem" tabIndex="-1"><i className="fas fa-sign-out-alt mr-2"></i> Sign Out</button>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Conditional Rendering of Main Content Sections */}
                            {activeMenuItem === 'dashboard' && <DashboardHomeContent darkMode={darkMode} isSidebarCollapsed={isSidebarCollapsed} onNavigate={handleNavigateToSection} />}
                            {activeMenuItem === 'mobility' && <MobilityView darkMode={darkMode} onSelectStudentMobility={handleSelectStudentMobility} onSelectPersonnelMobility={handleSelectPersonnelMobility} />}
                            {activeMenuItem === 'travelOrderAuthority' && <TravelOrderAuthoritySection darkMode={darkMode} />}
                            {activeMenuItem === 'mobility-students' && <MobilityStudentsView darkMode={darkMode} onBack={() => setActiveMenuItem('mobility')} />}
                            {activeMenuItem === 'mobility-personnel' && <MobilityPersonnelView darkMode={darkMode} onBack={() => setActiveMenuItem('mobility')} />}

                        </main>
                    </div>
                    <ManageProfileModal show={showManageProfileModal} onClose={handleCloseManageProfileModal} darkMode={darkMode} />
                </div>
            );
        }

    // =====================================================================
    // ROOT APP COMPONENT (Mounts the DashboardPage)
    // =====================================================================
    function App() {
        const [loggedInUser, setLoggedInUser] = React.useState(() => localStorage.getItem('loggedInUser'));
        const [darkMode, setDarkMode] = React.useState(() => {
            try {
                const savedMode = localStorage.getItem('darkModePreference');
                return savedMode ? JSON.parse(savedMode) : false;
            } catch (e) {
                console.error("Failed to parse dark mode preference:", e);
                return false;
            }
        });

        const toggleDarkMode = () => {
            setDarkMode(prevMode => {
                const newMode = !prevMode;
                localStorage.setItem('darkModePreference', JSON.stringify(newMode));
                document.body.classList.toggle('dark-mode', newMode);
                return newMode;
            });
        };

        React.useEffect(() => {
            document.body.classList.toggle('dark-mode', darkMode);
        }, [darkMode]);

        const handleSignOut = () => {
            localStorage.removeItem('loggedInUser');
            localStorage.removeItem('darkModePreference');
            localStorage.removeItem('dashboardTableRows');
            if (window.electronAPI && window.electronAPI.navigateToLogin) {
                window.electronAPI.navigateToLogin();
            } else {
                window.location.replace('login.html');
            }
        };

        React.useEffect(() => {
            if (!loggedInUser) {
                if (window.electronAPI && window.electronAPI.navigateToLogin) {
                    window.electronAPI.navigateToLogin();
                } else {
                    window.location.replace('login.html');
                }
            }
        }, [loggedInUser]);

        if (!loggedInUser) {
            return null; // Don't render anything until logged in
        }

        return (
            <div className={`w-screen h-screen flex justify-center items-center overflow-hidden dashboard-background`}>
                <DashboardPage onSignOut={handleSignOut} darkMode={darkMode} username={loggedInUser} toggleDarkMode={toggleDarkMode} />
            </div>
        );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
